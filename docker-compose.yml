version: '3.8'

services:
  # 前端服务：React 应用，通过 Nginx 提供访问
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - online-ide-network

  # 后端服务：Node.js API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/online-ide
      - JWT_SECRET=please-change-this-jwt-secret
      - DEFAULT_TEACHER_USERNAME=teacher
      - DEFAULT_TEACHER_PASSWORD=teacher123
      - CORS_ORIGIN=*
      - AI_API_BASE_URL=https://api.siliconflow.cn/v1
      - AI_MODEL=deepseek-ai/DeepSeek-V3
      - AI_TIMEOUT_MS=60000
      - AI_CONFIG_SECRET=please-change-this-ai-config-secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/online-ide:/tmp/online-ide
    depends_on:
      - mongodb
    networks:
      - online-ide-network

  # MongoDB 数据库
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - online-ide-network

  # Python 运行镜像
  python-compiler:
    build:
      context: ./Docker/python
      dockerfile: Dockerfile
    image: online-ide-python
    command: echo "Python compiler image built"

  # C++ 编译运行镜像
  cpp-compiler:
    build:
      context: ./Docker/cpp
      dockerfile: Dockerfile
    image: online-ide-cpp
    command: echo "C++ compiler image built"

  # Node.js 运行镜像
  nodejs-runtime:
    build:
      context: ./Docker/nodejs
      dockerfile: Dockerfile
    image: online-ide-nodejs
    command: echo "Node.js runtime image built"

volumes:
  mongodb-data:

networks:
  online-ide-network:
    driver: bridge
